<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً بك في أكوادرا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Cairo', sans-serif;
      }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen text-gray-800">
    <div class="max-w-md w-full text-center p-6">
        <h1 class="text-3xl font-bold text-slate-800 mb-4 tracking-tight">مرحباً بك في أكوادرا</h1>
        <p class="text-gray-600 mb-8">
            المنشئ الخارق الذي يساعدك على بناء تطبيقات جميلة باستخدام الذكاء الاصطناعي.
        </p>
        
        <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100 hover:scale-105 transition-all duration-300 cursor-pointer card group">
            <div class="flex items-center justify-center mx-auto mb-4">
                <svg viewBox="0 0 100 100" class="w-12 h-12" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <defs>
                    <linearGradient id="gold-gradient" x1="20" y1="20" x2="80" y2="80" gradientUnits="userSpaceOnUse">
                      <stop offset="0%" stop-color="#FDE047" />
                      <stop offset="45%" stop-color="#D97706" />
                      <stop offset="100%" stop-color="#78350F" />
                    </linearGradient>
                    <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
                      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.4" />
                    </filter>
                  </defs>
                  <path d="M50 8 C 54 8, 56 12, 58 15 L 88 75 C 90 79, 88 88, 80 88 H 20 C 12 88, 10 79, 12 75 L 42 15 C 44 12, 46 8, 50 8 Z" fill="#292524" stroke="#44403C" stroke-width="1" filter="url(#dropshadow)" />
                  <path d="M50 20 L 78 78 H 22 L 50 20 Z" stroke="url(#gold-gradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                  <g transform="translate(0, 2)">
                    <path d="M35 45 C 35 45, 42 35, 50 35 C 58 35, 65 45, 65 45 C 65 45, 58 55, 50 55 C 42 55, 35 45, 35 45 Z" stroke="url(#gold-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
                    <circle cx="50" cy="45" r="3.5" fill="url(#gold-gradient)" />
                  </g>
                  <path d="M28 78 V 70 L 35 63" stroke="url(#gold-gradient)" stroke-width="2" stroke-linecap="round" />
                  <circle cx="35" cy="63" r="2" fill="url(#gold-gradient)" />
                  <path d="M72 78 V 70 L 65 63" stroke="url(#gold-gradient)" stroke-width="2" stroke-linecap="round" />
                  <circle cx="65" cy="63" r="2" fill="url(#gold-gradient)" />
                  <path d="M50 78 V 65" stroke="url(#gold-gradient)" stroke-width="2" stroke-linecap="round" />
                  <circle cx="50" cy="65" r="2" fill="url(#gold-gradient)" />
                </svg>
            </div>
            <h2 class="text-xl font-semibold text-gray-900 mb-2">جاهز للبناء</h2>
            <p class="text-gray-500 text-sm">اطلب من الذكاء الاصطناعي تغيير هذا التصميم أو بناء شيء جديد كلياً.</p>
        </div>
        
        <div class="mt-8 text-sm text-gray-400">
            مدعوم بواسطة احدث نماذج الذكاء الاصطناعي
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
